<!doctype html>
<html class="h-full bg-gray-100">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body class="h-full">
        <div class="min-h-full">
            <div class="relative bg-green-800 pb-32">
                <nav class="bg-green-800">
                    <div class="mx-auto max-w-7xl sm:px-6 lg:px-8">
                        <div class="border-b border-white/10">
                            <div class="flex h-16 items-center justify-between px-4 sm:px-0">
                                <div class="flex items-center">
                                    <div class="shrink-0">
                                        <img src="logo.png" alt="Golf Scorer X" class="size-8" />
                                    </div>
                                    <div>
                                        <div class="ml-10 flex items-baseline space-x-4">
                                            <span class="text-2xl font-medium text-white">Golf Scorer X</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>

            <main class="relative -mt-32">
                <div class="mx-auto max-w-7xl px-4 pb-12 sm:px-6 lg:px-8">
                    <div class="rounded-lg bg-white px-5 py-6 shadow sm:px-6">
                        <p class="mb-4">
                            Golf Scorer X is a very simple golf scoring application that supports scoring strokes, Stableford and Wolf points in
                            a nice simple user interface
                        </p>
                        <hr />
                        <h1 class="mt-4 text-3xl">Support</h1>
                        <p class="mt-2 mb-8">
                            Please email <a href="mailto:ben@edwards.nz">ben@edwards.nz</a> for any issues or support.
                        </p>
                        <hr />
                        <h1 class="mt-4 text-3xl">Privacy Policy</h1>
                        <p class="my-2">
                            Please email <a href="mailto:ben@edwards.nz">ben@edwards.nz</a> for any issues or support.
                        </p>
                    </div>
                </div>
            </main>
        </div>
    </body>
</html>
